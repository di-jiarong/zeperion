name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile sources
        run: python -m compileall -q zeperion tests examples/auth-system/run_demo.py

      - name: Run tests
        run: python -m pytest -q

      # Blocking gate: pyflakes correctness (F) + import ordering (I).
      # The whole tree is verified isort-clean, so I is safe to enforce.
      - name: Run Ruff (blocking — correctness + import order)
        run: python -m ruff check zeperion tests examples/auth-system/run_demo.py --select F,I

      # The wider style/modernise rule set (E/N/W/UP) is surfaced but NOT
      # yet blocking: the codebase predates the rules (mostly UP045
      # ``Optional[X]`` -> ``X | None`` modernisation). Clean incrementally,
      # then fold these into the blocking step above.
      - name: Run Ruff (non-blocking — style + modernise)
        continue-on-error: true
        run: python -m ruff check zeperion tests examples/auth-system/run_demo.py --select E,N,W,UP

      # Type checking is advisory until the annotation debt in the graph
      # and CLI layers is paid down (mypy is configured strict in
      # pyproject.toml: disallow_untyped_defs).
      - name: Run mypy (non-blocking)
        continue-on-error: true
        run: python -m mypy zeperion,I
